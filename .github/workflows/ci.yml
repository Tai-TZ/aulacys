name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Domain core (agents / policy / schemas) — after P0/P1 move out of apps/api
  shared:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/shared/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check aulacys/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key

  # Graph API host (was apps/api) — imports aulacys from packages/shared
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orchestrator-svc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            services/orchestrator-svc/requirements.txt
            packages/shared/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r ../../packages/shared/requirements.txt
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          OPENAI_API_KEY: test-key
          PYTHONPATH: .:../../packages/shared

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # Use npm ci once package-lock.json is committed; falls back to install otherwise.
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  # Postgres-backed microservices (audit / los / application) — REQUIRE_DB fails on skip
  db-services:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: audit-svc
            schema: audit
          - service: los-svc
            schema: los
          - service: application-svc
            schema: application
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pytest (REQUIRE_DB)
        run: pytest -q --tb=short
        env:
          REQUIRE_DB: "1"
          DB_SCHEMA: ${{ matrix.schema }}
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?options=-csearch_path%3D${{ matrix.schema }}&connect_timeout=3
          DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?options=-csearch_path%3D${{ matrix.schema }}&connect_timeout=3
