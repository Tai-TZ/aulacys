# Render Blueprint — deploys the orchestrator API (services/orchestrator-svc).
# The Next.js frontend (apps/web) deploys to Vercel — see docs/DEPLOY.md.
#
# Usage: Render Dashboard → New → Blueprint → pick this repo → apply.
# Then set the secret env vars (OPENAI_API_KEY, CORS_ORIGINS) in the dashboard.

services:
  - type: web
    name: app-api
    runtime: docker
    # Orchestrator Dockerfile COPYs packages/shared + services/orchestrator-svc → context = repo root.
    dockerfilePath: services/orchestrator-svc/Dockerfile
    dockerContext: .
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_HOST
        value: 0.0.0.0
      # LLM prose layer — FPT AI Factory (OpenAI-compatible). All 5 agents run
      # in-process in this single container; numbers/veto stay deterministic.
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_BASE_URL
        value: https://mkp-api.fptcloud.com/v1
      - key: MODEL_NAME
        value: Llama-3.3-70B-Instruct
      - key: STRONG_MODEL
        value: Llama-3.3-70B-Instruct
      - key: MINI_MODEL
        value: Llama-3.3-70B-Instruct
      # Secrets — set these in the Render dashboard (sync:false = not in git):
      - key: OPENAI_API_KEY
        sync: false
      # MUST equal the deployed frontend origin, e.g. https://your-app.vercel.app
      # (comma-separated for multiple). Without this, the browser blocks the API (CORS).
      - key: CORS_ORIGINS
        sync: false
