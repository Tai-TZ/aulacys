# DEFAULT = full microservice stack.
#   docker compose up --build
# boots the orchestrator (wired to every service), the web app, and all services.
# The in-process fallback stays as resilience: if a service dies, the orchestrator
# serves that piece locally and the demo survives — but the DEFAULT path is the
# real distributed call. For a services-only dev run use docker-compose.services.yml.

services:
  # ---------- orchestrator (composition root) ----------
  api:
    build:
      context: .
      dockerfile: services/orchestrator-svc/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./services/orchestrator-svc/.env
    environment:
      POLICY_SVC_URL: http://policy-svc:8100
      AUDIT_SVC_URL: http://audit-svc:8200
      CIC_SVC_URL: http://cic-svc:8300
      LOS_SVC_URL: http://los-svc:8310
      AML_SVC_URL: http://aml-svc:8320
      PROPERTY_SVC_URL: http://property-svc:8330
      INCOME_SVC_URL: http://income-svc:8340
      APPLICATION_SVC_URL: http://application-svc:8360
      # Single-container agents: NO AGENT_WORKER_URL → all 5 run in-process in this orchestrator.
    depends_on:
      - policy-svc
      - audit-svc
      - cic-svc
      - los-svc
      - aml-svc
      - property-svc
      - income-svc
      - application-svc
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---------- frontend ----------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_GATEWAY_URL=http://localhost:8080
    depends_on:
      - api
      - api-gateway
    restart: unless-stopped
  # ---------- gateway (front door + monitor) ----------
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      MONOLITH_URL: http://api:8000
      POLICY_SVC_URL: http://policy-svc:8100
      AUDIT_SVC_URL: http://audit-svc:8200
      CIC_SVC_URL: http://cic-svc:8300
      LOS_SVC_URL: http://los-svc:8310
      AML_SVC_URL: http://aml-svc:8320
      PROPERTY_SVC_URL: http://property-svc:8330
      INCOME_SVC_URL: http://income-svc:8340
      CATALOG_SVC_URL: http://catalog-svc:8350
      APPLICATION_SVC_URL: http://application-svc:8360
      AGENT_WORKER_URL: http://agent-worker-svc:8400
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      - api
    restart: unless-stopped

  # ---------- policy / audit / los (stateful or engine) ----------
  policy-svc:
    build: ./services/policy-svc
    ports: ["8100:8100"]
    restart: unless-stopped

  audit-svc:
    build: ./services/audit-svc
    ports: ["8200:8200"]
    env_file:
      - ./services/audit-svc/.env   # DATABASE_URL + DIRECT_URL (Supabase, gitignored)
    restart: unless-stopped

  los-svc:
    build: ./services/los-svc
    ports: ["8310:8310"]
    env_file:
      - ./services/los-svc/.env     # DATABASE_URL + DIRECT_URL (Supabase, gitignored)
    restart: unless-stopped

  # ---------- external mocks + catalog (seed) ----------
  cic-svc:
    build: ./services/cic-svc
    ports: ["8300:8300"]
    restart: unless-stopped

  aml-svc:
    build: ./services/aml-svc
    ports: ["8320:8320"]
    restart: unless-stopped

  property-svc:
    build: ./services/property-svc
    ports: ["8330:8330"]
    restart: unless-stopped

  income-svc:
    build: ./services/income-svc
    ports: ["8340:8340"]
    restart: unless-stopped

  catalog-svc:
    build: ./services/catalog-svc
    ports: ["8350:8350"]
    restart: unless-stopped

  application-svc:
    build: ./services/application-svc
    ports: ["8360:8360"]
    env_file:
      - ./services/application-svc/.env
  legal-svc:
    build: ./services/legal-svc
    ports: ["8370:8370"]
    restart: unless-stopped

  # ---------- agent workers (4 processes; see SERVICE-CODING-PLAN §12) ----------
  agent-worker-svc:
    build:
      context: .
      dockerfile: services/agent-worker-svc/Dockerfile
    ports: ["8400:8400"]
    environment:
      CIC_SVC_URL: http://cic-svc:8300
      INCOME_SVC_URL: http://income-svc:8340
      PROPERTY_SVC_URL: http://property-svc:8330
      AML_SVC_URL: http://aml-svc:8320
      POLICY_SVC_URL: http://policy-svc:8100
    restart: unless-stopped
