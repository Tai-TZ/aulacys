# Alias kept for demo message path + existing tests.
# Prefer loan-unsecured-term / loan-unsecured-overdraft for new callers.
agents: [credit, compliance]
tools:
  - cic_lookup
  - salary_verify
  - compute_annual_debt_service
  - compute_dti
  - price_loan
  - kyc_check
  - ubo_check
  - aml_screen
  - related_party
policy: retail_lending.yaml
limits:
  amount_ceiling: 500000000
  term_months_max: 60
pricing:
  base_rate: 0.13
  min_rate: 0.11
  max_rate: 0.18
  max_dti: 0.5
  income_multiple: 14
  cic_group_premium_bps: 100
  dti_premium_threshold: 0.4
  dti_premium_bps: 75
  term_premium_threshold_months: 48
  term_premium_bps: 50
  bad_debt_premium_bps: 300
documents:
  required: [cccd, sao_ke_luong, cic]
gate:
  stp_when: all_rules_pass
  else: hitl
