# Alias kept for demo message path + existing tests.
# Prefer catalog ids (loan-1, …) for new callers.
agents: [credit, operations, compliance]
depends:
  compliance: [operations]
tools:
  - cic_lookup
  - income_verify
  - compute_annual_debt_service
  - compute_dti
  - price_loan
  - sao_ke_parse
  - schedule_valuation
  - property_valuation
  - land_registry
  - doc_checklist
  - compute_ltv
  - kyc_check
  - ubo_check
  - aml_screen
  - related_party
policy: retail_lending.yaml
limits:
  ltv_cap: 0.9
  term_years_max: 35
pricing:
  base_rate: 0.105
  min_rate: 0.095
  max_rate: 0.14
  max_dti: 0.5
  income_multiple: 48
  cic_group_premium_bps: 75
  dti_premium_threshold: 0.4
  dti_premium_bps: 50
  term_premium_threshold_months: 180
  term_premium_bps: 30
  bad_debt_premium_bps: 250
documents:
  required: [cccd, sao_ke_tai_khoan, so_do, hop_dong_mua_ban, cic, purpose_evidence]
  optional: [dang_ky_ket_hon]
gate:
  stp_when: never
  else: hitl
