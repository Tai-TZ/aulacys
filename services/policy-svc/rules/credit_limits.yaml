# Hard legal limits — copy owned by policy-svc.
# Keep in sync with apps/api/src/policy/rules/credit_limits.yaml.
# Every rule with verified: false is a PLACEHOLDER a human must check against the
# current law before the demo (the 2024 law stepped these ratios down by year).

rules:
  - id: single_customer_credit_limit
    description: >-
      Total credit exposure to a single customer, as a ratio of the bank's own capital.
    legal_basis: "Luật Các tổ chức tín dụng 2024, Điều 136"
    metric: exposure_ratio_single_customer
    operator: "<="
    threshold: 0.15
    unit: ratio_of_own_capital
    effective_from: "2024-07-01"
    severity: blocking
    veto_agent: compliance
    verified: false  # 0.15 is the PRE-2024 figure — verify against the 2024 schedule

  - id: related_party_credit_limit
    description: >-
      Total credit exposure to a customer and its related parties, as a ratio of own capital.
    legal_basis: "Luật Các tổ chức tín dụng 2024, Điều 136"
    metric: exposure_ratio_related_group
    operator: "<="
    threshold: 0.25
    unit: ratio_of_own_capital
    effective_from: "2024-07-01"
    severity: blocking
    veto_agent: compliance
    verified: false  # pre-2024 flat figure — verify

  - id: sanctions_hit
    description: >-
      Customer, UBO, or a related party appears on a sanctions list.
    legal_basis: "Luật Phòng, chống rửa tiền 2022, Điều 9 và Điều 10"
    metric: sanctions_match_count
    operator: "=="
    threshold: 0
    unit: count
    effective_from: "2023-03-01"
    severity: blocking
    veto_agent: compliance
    verified: true

  - id: pep_requires_enhanced_dd
    description: >-
      A politically exposed person in the ownership chain requires enhanced due
      diligence and senior approval — it does not by itself block the loan.
    legal_basis: "Luật Phòng, chống rửa tiền 2022, Điều 17"
    metric: pep_match_count
    operator: "=="
    threshold: 0
    unit: count
    effective_from: "2023-03-01"
    severity: warning
    veto_agent: compliance
    verified: true

  - id: min_dscr
    description: >-
      Minimum debt service coverage ratio for a corporate term loan.
    legal_basis: "SHB internal credit policy (MOCK — not a real SHB document)"
    metric: dscr
    operator: ">="
    threshold: 1.2
    unit: ratio
    effective_from: "2026-01-01"
    severity: warning
    veto_agent: credit
    verified: true

  - id: max_ltv_real_estate
    description: >-
      Maximum loan-to-value against real-estate collateral.
    legal_basis: "SHB internal credit policy (MOCK — not a real SHB document)"
    metric: ltv
    operator: "<="
    threshold: 0.7
    unit: ratio
    effective_from: "2026-01-01"
    severity: warning
    veto_agent: credit
    verified: true
