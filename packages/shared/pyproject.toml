[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "aulacys-shared"
version = "0.1.0"
description = "Shared domain + application core (agents, policy, tools, schemas) for orchestrator-svc and agent-worker-svc."
requires-python = ">=3.11"
dynamic = ["dependencies"]

[tool.setuptools]
packages = ["aulacys"]

[tool.setuptools.dynamic]
dependencies = { file = ["requirements.txt"] }

[tool.pytest.ini_options]
pythonpath = ["."]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 120
