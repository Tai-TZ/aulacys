# Microservice split — added incrementally alongside the monolith.
# The monolith (apps/api) keeps working; each extracted service is one block here.
# Run: docker compose -f docker-compose.services.yml up --build
#
# Phase 1: policy-svc (done). Phases 2-6 (audit, tool/external, gateway, agents,
# orchestrator wiring) get added as blocks below. See docs/ARCHITECTURE-services.md.

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./services/db/init-schemas.sql:/docker-entrypoint-initdb.d/01-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    environment:
      MONOLITH_URL: http://host.docker.internal:8000
      POLICY_SVC_URL: http://policy-svc:8100
      AUDIT_SVC_URL: http://audit-svc:8200
      CIC_SVC_URL: http://cic-svc:8300
      LOS_SVC_URL: http://los-svc:8310
      AML_SVC_URL: http://aml-svc:8320
      PROPERTY_SVC_URL: http://property-svc:8330
      INCOME_SVC_URL: http://income-svc:8340
      CATALOG_SVC_URL: http://catalog-svc:8350
      APPLICATION_SVC_URL: http://application-svc:8360
      LEGAL_SVC_URL: http://legal-svc:8370
      CREDIT_AGENT_URL: http://credit-svc:8400
      OPERATIONS_AGENT_URL: http://operations-svc:8400
      COMPLIANCE_AGENT_URL: http://compliance-svc:8400
      CRITIC_AGENT_URL: http://critic-svc:8400
      CORS_ORIGINS: http://localhost:3000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  policy-svc:
    build: ./services/policy-svc
    ports:
      - "8100:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  audit-svc:
    build: ./services/audit-svc
    ports:
      - "8200:8200"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Daudit
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Daudit
      DB_SCHEMA: audit
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  cic-svc:
    build: ./services/cic-svc
    ports:
      - "8300:8300"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  los-svc:
    build: ./services/los-svc
    ports:
      - "8310:8310"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Dlos
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Dlos
      DB_SCHEMA: los
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8310/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  aml-svc:
    build: ./services/aml-svc
    ports:
      - "8320:8320"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8320/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  property-svc:
    build: ./services/property-svc
    ports:
      - "8330:8330"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8330/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  income-svc:
    build: ./services/income-svc
    ports:
      - "8340:8340"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8340/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  catalog-svc:
    build: ./services/catalog-svc
    ports:
      - "8350:8350"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8350/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  application-svc:
    build: ./services/application-svc
    ports:
      - "8360:8360"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Dapplication
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/postgres?options=-csearch_path%3Dapplication
      DB_SCHEMA: application
    depends_on:
      postgres:
        condition: service_healthy
  legal-svc:
    build: ./services/legal-svc
    ports:
      - "8370:8370"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8370/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  credit-svc:
    build:
      context: .
      dockerfile: services/agent-worker-svc/Dockerfile
    ports:
      - "8401:8400"
    environment:
      AGENT_NAME: credit
      CIC_SVC_URL: http://cic-svc:8300
      INCOME_SVC_URL: http://income-svc:8340
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  operations-svc:
    build:
      context: .
      dockerfile: services/agent-worker-svc/Dockerfile
    ports:
      - "8402:8400"
    environment:
      AGENT_NAME: operations
      PROPERTY_SVC_URL: http://property-svc:8330
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  compliance-svc:
    build:
      context: .
      dockerfile: services/agent-worker-svc/Dockerfile
    ports:
      - "8403:8400"
    environment:
      AGENT_NAME: compliance
      AML_SVC_URL: http://aml-svc:8320
      POLICY_SVC_URL: http://policy-svc:8100
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  critic-svc:
    build:
      context: .
      dockerfile: services/agent-worker-svc/Dockerfile
    ports:
      - "8404:8400"
    environment:
      AGENT_NAME: critic
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8400/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pg-data:
